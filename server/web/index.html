<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Server NETW1 - HUTECH</title>
    <style>
        body {
            background-color: #f0f4f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border-top: 5px solid #005596; 
        }

        .logo {
            max-width: 250px;
            margin-bottom: 20px;
        }

        h1 {
            color: #005596;
            font-size: 24px;
            margin-bottom: 10px;
        }

        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 15px 0;
        }

        a {
            text-decoration: none;
            color: #ed1c24; 
            font-weight: bold;
            padding: 10px 20px;
            border: 1px solid #ed1c24;
            border-radius: 5px;
            transition: all 0.3s;
            display: inline-block;
            width: 80%;
        }

        a:hover {
            background-color: #ed1c24;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/web/hutech-logo.png" alt="HUTECH Logo" class="logo">
        
        <h1>Đây là trang chủ của NETW1</h1>
        <p style="color: #666;">
        <hr>
        
        <h3>Chức năng Server:</h3>
        <ul>
            <li><a href="/hello">Xem API Hello World</a></li>
            <li><a href="/api/time">Xem API Ngày giờ hệ thống</a></li>
        </ul>
    </div>
</body>
</html>
